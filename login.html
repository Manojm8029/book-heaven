<!doctype html>
<html lang="en">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Login — Book Heaven Pro</title><link rel="stylesheet" href="styles.css"/></head>
<body>
  <header class="site-header"><div class="container header-inner"><a class="logo" href="index.html">📚 <span>Book Heaven</span></a></div></header>
  <main class="container auth-page">
    <form id="login-form" class="auth-card">
      <h2>Welcome back</h2>
      <label>Email
        <div class="pw-row">
          <input id="email" type="email" required/>
        </div></label>
      <label>Password
        <div class="pw-row">
          <input id="password" type="password" required/>
          <button id="toggle-pw" type="button" class="icon-btn" aria-label="Show password">👁️</button>
        </div>
      </label>
      <div class="form-actions">
        <button type="submit" class="btn primary">Login</button>
        <a href="register.html" class="btn ghost">Register</a>
      </div>
      <div id="msg" class="msg"></div>
    </form>
  </main>
<script src="auth.js"></script>
<script>
document.getElementById('login-form').addEventListener('submit', (e)=>{
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  try{
    loginUser({email,password});
    window.location = 'index.html';
  } catch(err){ document.getElementById('msg').textContent = err.message; }
});
document.getElementById('toggle-pw').addEventListener('click', ()=>{
  const p = document.getElementById('password');
  p.type = p.type === 'password' ? 'text' : 'password';
});
</script>
</body></html>

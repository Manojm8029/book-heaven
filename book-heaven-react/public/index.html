<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Book Heaven — Pro</title>
  <link rel="stylesheet" href="styles.css" />
  <meta name="description" content="Book Heaven — Online bookstore demo (Pro)"/>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="index.html">📚 <span>Book Heaven</span></a>

      <div class="search-wrap">
        <input id="search" class="search" placeholder="Search books, authors, ISBN..." />
        <button id="search-btn" class="icon-btn" aria-label="Search">🔎</button>
      </div>

      <nav class="nav" id="nav-area" style="display:flex;align-items:center;gap:0.75rem;flex-wrap:nowrap;">
        <div id="auth-area" class="auth-area" style="display:flex;align-items:center;gap: 10px;"></div>
        <button id="open-cart" class="cart-btn" aria-label="Open cart" style="display:inline-flex;align-items:center;padding:0.4rem 0.6rem;">🛒 <span id="cart-count" style="margin-left:1.4rem;">0</span></button>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero pro-hero">
      <div>
       <h2>Find your next great read</h2>
        <p class="muted">Curated selection — novels, poetry, non-fiction and more.</p>
      </div>
    </section>
  

    <section class="controls">
      <label class="select-wrap">Category
        <select id="category-filter"><option value="all">All</option></select>
      </label>

      <div class="filters-right">
        <label class="sort-wrap">Sort
          <select id="sort-select">
            <option value="featured">Featured</option>
            <option value="price-asc">Price — Low to High</option>
            <option value="price-desc">Price — High to Low</option>
          </select>
        </label>
      </div>
    </section>

    <section id="product-grid" class="grid" aria-live="polite"></section>
  </main>

  <!-- Book modal -->
  <div id="book-modal" class="modal hidden" role="dialog" aria-hidden="true">
    <div class="modal-content">
      <button class="close-modal" id="close-modal" aria-label="Close">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- Cart drawer -->
  <aside id="cart-drawer" class="cart-drawer hidden" aria-hidden="true">
    <div class="cart-header">
      <h3>Your Cart</h3>
      <button id="close-cart" aria-label="Close cart">&times;</button>
    </div>
    <div id="cart-items" class="cart-items"></div>
    <div class="cart-footer">
      <div class="totals">
        <span>Total:</span><strong id="cart-total">₹0.00</strong>
      </div>
      <div class="cart-actions">
        <button id="clear-cart" class="btn ghost">Clear</button>
        <button id="checkout" class="btn primary">Checkout</button>
      </div>
    </div>
  </aside>

  <footer class="site-footer">
    <div class="container">Made with 💙 — Book Heaven Pro</div>
  </footer>

  <script src="products.js"></script>
  <script src="auth.js"></script>
  <script src="script.js"></script>
</body>
</html>
